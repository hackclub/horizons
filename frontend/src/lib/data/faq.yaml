- question: "What's a hackathon?"
  answer: "A social coding marathon! Imagine a weekend where teenagers come together to code projects for fun—however goofy or janky—and share them with each other. You’ll have a goal to work towards, side quests to tackle, and new friends to hang out with. You don’t need coding experience—just an open mind."

- question: "Is this for free?"
  answer: "Yep. It's completely free. Just hack on & ship projects to qualify & earn your ticket."

- question: "Who's eligible?"
  answer: "If you're under 18 and still in high school!"

- question: "Will my travel be covered?"
  answer: "We'll cover travel for additional work submitted beyond the base hour requirement (around $8.5/hr). We'll also provide applications for need-based stipends."

- question: "My parents are worried!"
  answer: "For any questions or concerns, you can email us at horizons@hackclub.com."
